---
apiVersion: v1
kind: Service
metadata:
  annotations:
    app.quarkus.io/quarkus-version: 3.35.2
    app.quarkus.io/vcs-uri: https://github.com/rmortale/quarkus-jdbc-paramsource.git
  labels:
    app.kubernetes.io/name: quarkus-jdbc-paramsource
    app.kubernetes.io/managed-by: quarkus
  name: quarkus-jdbc-paramsource
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8080
  selector:
    app.kubernetes.io/name: quarkus-jdbc-paramsource
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    app.quarkus.io/quarkus-version: 3.35.2
    app.quarkus.io/vcs-uri: https://github.com/rmortale/quarkus-jdbc-paramsource.git
  labels:
    app.kubernetes.io/name: quarkus-jdbc-paramsource
    app.kubernetes.io/managed-by: quarkus
  name: quarkus-jdbc-paramsource
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: quarkus-jdbc-paramsource
  template:
    metadata:
      annotations:
        app.quarkus.io/quarkus-version: 3.35.2
        app.quarkus.io/vcs-uri: https://github.com/rmortale/quarkus-jdbc-paramsource.git
      labels:
        app.kubernetes.io/managed-by: quarkus
        app.kubernetes.io/name: quarkus-jdbc-paramsource
    spec:
      containers:
        - env:
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - secretRef:
                name: postgres-secret
          image: ghcr.io/rmortale/quarkus-jdbc-paramsource:1.0.0-SNAPSHOT
          imagePullPolicy: Always
          name: quarkus-jdbc-paramsource
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
      terminationGracePeriodSeconds: 10
